[db]
connection_url = postgresql://workspace:pass@localhost:5432/workspace


[logging]
config = logging.yaml


[iam]
iam_endpoint = http://127.0.0.1:10101/api/core/v1/iam/clients/00000000-0000-0000-0000-000000000000
audience = Exordos
hs256_jwks_decryption_key =
# token_encryption_algorithm = HS256


[HS256]
# encryption_key = secret


[workspace_api]
bind_host = 127.0.0.1
bind_port = 21084
workers = 1


[messenger_api]
bind_host = 127.0.0.1
bind_port = 21081
workers = 1


[messenger_storage]
mode = mail_projection
canonical_cutover_confirmed = false


[messenger_mail]
smtp_host = 127.0.0.1
smtp_port = 25
smtp_security = plain
imap_host = 127.0.0.1
imap_port = 1143
imap_security = plain
imap_master_username = workspace-service
imap_master_password =
technical_domain = messenger.workspace.invalid
state_mailbox = Workspace/State
event_mailbox_prefix = Workspace/Events
