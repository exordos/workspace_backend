# Workspace Messenger keeps its durable state in local Maildir mailboxes.
# The service is reachable only on the platform-internal network. End users
# never receive IMAP credentials and authenticate to Workspace through IAM.

protocols = imap
listen = 0.0.0.0
ssl = no
auth_allow_cleartext = yes
auth_mechanisms = plain login
auth_master_user_separator = *

mail_home = /var/lib/workspace/messenger/mail/%{user | domain}/%{user | username}
mail_driver = maildir
mail_path = ~/Maildir
mail_inbox_path = ~/Maildir
# Maildir content and control files are durable, but Dovecot indexes are a
# rebuildable cache.  Keep them on the runtime filesystem so an abrupt VM
# replacement cannot carry a partially written transaction log into the next
# boot.
mail_index_path = /run/workspace/dovecot-indexes/%{user | domain}/%{user | username}
mail_uid = workspace
mail_gid = workspace
first_valid_uid = 1

passdb workspace-master {
  driver = passwd-file
  master = yes
  result_success = continue
  passwd_file_path = /etc/dovecot/workspace-master.passwd
}

passdb workspace-authorized {
  driver = static
  static_password = {CRYPT}*
}

userdb workspace-static {
  driver = static
  fields {
    uid = workspace
    gid = workspace
    home = /var/lib/workspace/messenger/mail/%{user | domain}/%{user | username}
  }
}

namespace inbox {
  inbox = yes
  separator = /

  mailbox "Workspace/State" {
    auto = create
  }

  mailbox "Workspace/Events" {
    auto = create
  }
}

service imap-login {
  inet_listener imap {
    port = 1143
  }

  inet_listener imaps {
    port = 0
  }
}
