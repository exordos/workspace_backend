workspace_zulip_bridge_ingress_lda:
  driver = pipe
  command = /usr/lib/dovecot/dovecot-lda -d zulip-bridge-ingress@messenger.workspace.invalid
  user = workspace
  group = workspace
  return_path_add
  delivery_date_add
  envelope_to_add

workspace_dovecot_lda:
  driver = pipe
  command = /usr/lib/dovecot/dovecot-lda -d $local_part_data@$domain_data
  user = workspace
  group = workspace
  return_path_add
  delivery_date_add
  envelope_to_add
