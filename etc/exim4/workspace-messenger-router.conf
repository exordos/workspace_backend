workspace_zulip_bridge_ingress:
  driver = accept
  domains = messenger.workspace.invalid
  local_parts = zulip-bridge-ingress
  condition = ${if and{{eq{$authenticated_id}{zulip-bridge}}{eq{$sender_address}{zulip-bridge@messenger.workspace.invalid}}}{yes}{no}}
  transport = workspace_zulip_bridge_ingress_lda
  no_verify
  no_expn

workspace_messenger_maildir:
  driver = accept
  domains = messenger.workspace.invalid
  condition = ${if eq{$authenticated_id}{workspace-service}{yes}{no}}
  local_parts = nwildlsearch,ret=key;/etc/exim4/workspace-messenger-local-parts
  transport = workspace_dovecot_lda
  no_verify
  no_expn
