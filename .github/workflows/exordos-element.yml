name: Exordos element

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: default
        type: choice
        options:
          - default
          - production_migration
      publish:
        description: "Publish the built element to the configured Exordos repository"
        required: false
        default: false
        type: boolean

env:
  ARTIFACTS_PATH: output
  EXORDOS_CFG: exordos/exordos.yaml
  WORKSPACE_UI_REPOSITORY: https://github.com/exordos/workspace_ui.git
  WORKSPACE_UI_REF: 786c5d6ca399b391331eb08d1b6ea0f83f6bc578

jobs:
  build:
    runs-on: [self-hosted, vm]
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
    outputs:
      production_migration_compatibility_version: ${{ steps.production_migration.outputs.compatibility_version }}
      production_migration_stage_version: ${{ steps.production_migration.outputs.stage_version }}
      production_migration_canonical_version: ${{ steps.production_migration.outputs.canonical_version }}
      production_migration_rollback_version: ${{ steps.production_migration.outputs.rollback_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout compatible Workspace UI
        run: |
          set -euo pipefail

          ui_dir="${GITHUB_WORKSPACE}/../workspace_ui"
          rm -rf "${ui_dir}"
          git init --quiet "${ui_dir}"
          git -C "${ui_dir}" remote add origin "${WORKSPACE_UI_REPOSITORY}"
          git -C "${ui_dir}" fetch --depth=1 origin "${WORKSPACE_UI_REF}"
          git -C "${ui_dir}" checkout --detach --quiet FETCH_HEAD
          test "$(git -C "${ui_dir}" rev-parse HEAD)" = "${WORKSPACE_UI_REF}"

      - name: Install compatible Exordos CLI
        env:
          EXORDOS_RELEASE_URL: https://github.com/exordos/exordos/releases/download/3.0.2/exordos-linux
          EXORDOS_RELEASE_SHA256: 469007b01253f69b5fcf540b8f6605a360c2539019a5b148fbabb0353bee6a5b
        run: |
          set -euo pipefail

          command -v curl
          command -v sha256sum
          exordos_bin="${RUNNER_TEMP}/exordos"
          exordos_download="${exordos_bin}.download"
          rm -f "${exordos_download}"
          curl --fail --location --silent --show-error \
            --connect-timeout 30 \
            --max-time 180 \
            --retry 4 \
            --retry-all-errors \
            --retry-delay 5 \
            --retry-max-time 600 \
            "${EXORDOS_RELEASE_URL}" \
            --output "${exordos_download}"
          printf "%s  %s\n" "${EXORDOS_RELEASE_SHA256}" "${exordos_download}" \
            | sha256sum --check --status -
          mv "${exordos_download}" "${exordos_bin}"
          chmod 0755 "${exordos_bin}"
          printf "EXORDOS_BIN=%s\n" "${exordos_bin}" >> "${GITHUB_ENV}"
          printf "EXORDOS_RELEASE_SHA256=%s\n" "${EXORDOS_RELEASE_SHA256}" \
            >> "${GITHUB_ENV}"
          "${exordos_bin}" version

      - name: Check Exordos build prerequisites
        run: |
          set -euo pipefail

          "${EXORDOS_BIN}" version
          command -v packer
          command -v qemu-img
          command -v qemu-system-x86_64
          command -v mkisofs

      - name: Build element
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile != 'production_migration' }}
        run: |
          set -euo pipefail

          rm -rf "${ARTIFACTS_PATH}"
          "${EXORDOS_BIN}" build . \
            --exordos-cfg-file "${EXORDOS_CFG}" \
            --output-dir "${ARTIFACTS_PATH}" \
            --force

      - name: Show build output
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile != 'production_migration' }}
        run: |
          set -euo pipefail
          find "${ARTIFACTS_PATH}" -maxdepth 4 -type f -printf "%p %s bytes\n"

      - name: Publish element
        env:
          BUILD_PROFILE: ${{ inputs.profile }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          PUSH_CFG: ${{ secrets.PUSH_CFG }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" \
            && "${BUILD_PROFILE:-default}" == "production_migration" ]]; then
            exit 0
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" \
            && "${PUBLISH_REQUESTED:-false}" != "true" ]]; then
            exit 0
          fi

          : "${PUSH_CFG:?Set secret PUSH_CFG to base64-encoded exordos.push.yaml content}"

          push_cfg_path="${RUNNER_TEMP}/exordos.push.yaml"
          printf "%s" "${PUSH_CFG}" | base64 -d > "${push_cfg_path}"

          latest_arg=()
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            latest_arg=(--latest)
          fi

          "${EXORDOS_BIN}" push . \
            --exordos-cfg-file "${push_cfg_path}" \
            --element-dir "${ARTIFACTS_PATH}" \
            --force \
            "${latest_arg[@]}"

      - name: Build, verify, and optionally publish production migration artifacts
        id: production_migration
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.profile == 'production_migration' }}
        env:
          CURRENT_BACKEND_IMAGE_URN: ${{ secrets.WORKSPACE_PRODUCTION_CURRENT_BACKEND_IMAGE_URN }}
          CURRENT_MAIL_IMAGE_URN: ${{ secrets.WORKSPACE_PRODUCTION_CURRENT_MAIL_IMAGE_URN }}
          EVIDENCE_ARCHIVE_ROOT: ${{ secrets.WORKSPACE_PRODUCTION_MIGRATION_EVIDENCE_DIR }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          PUSH_CFG: ${{ secrets.PUSH_CFG }}
        run: |
          set -euo pipefail
          umask 077

          command -v git
          command -v python3
          command -v zstd
          python3 -c 'import yaml'
          : "${CURRENT_BACKEND_IMAGE_URN:?Set secret WORKSPACE_PRODUCTION_CURRENT_BACKEND_IMAGE_URN}"
          : "${CURRENT_MAIL_IMAGE_URN:?Set secret WORKSPACE_PRODUCTION_CURRENT_MAIL_IMAGE_URN}"
          : "${EVIDENCE_ARCHIVE_ROOT:?Set secret WORKSPACE_PRODUCTION_MIGRATION_EVIDENCE_DIR}"
          : "${EXORDOS_RELEASE_SHA256:?Exordos release digest is unavailable}"
          [[ "${PUBLISH_REQUESTED:-false}" == "true" \
            || "${PUBLISH_REQUESTED:-false}" == "false" ]] \
            || { echo "The publish input must be true or false" >&2; exit 1; }
          if [[ "${PUBLISH_REQUESTED:-false}" == "true" ]]; then
            : "${PUSH_CFG:?Set secret PUSH_CFG to base64-encoded exordos.push.yaml content}"
          fi
          [[ "${CURRENT_BACKEND_IMAGE_URN}" =~ ^urn:images:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]] \
            || { echo "The configured production backend image secret is invalid" >&2; exit 1; }
          [[ "${CURRENT_MAIL_IMAGE_URN}" =~ ^urn:images:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]] \
            || { echo "The configured production mail image secret is invalid" >&2; exit 1; }

          migration_root="${ARTIFACTS_PATH}/production-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          compatibility_dir="${migration_root}/compatibility"
          stage_dir="${migration_root}/stage"
          canonical_dir="${migration_root}/canonical"
          rollback_dir="${migration_root}/rollback"
          test ! -e "${migration_root}"
          (umask 077 && mkdir -m 0700 -p "${migration_root}")

          archive_name="workspace-production-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          archive_tmp="${EVIDENCE_ARCHIVE_ROOT}/.${archive_name}.tmp"
          archive_final="${EVIDENCE_ARCHIVE_ROOT}/${archive_name}"
          set +e
          (
            set -euo pipefail
            umask 077
            mkdir -p "${EVIDENCE_ARCHIVE_ROOT}"
            chmod 0700 "${EVIDENCE_ARCHIVE_ROOT}"
            test ! -e "${archive_tmp}"
            test ! -e "${archive_final}"
            mkdir -m 0700 "${archive_tmp}"
            test -w "${archive_tmp}"
          ) 2>/dev/null
          archive_status=$?
          set -e
          if (( archive_status != 0 )); then
            echo "Private production migration evidence preflight failed" >&2
            exit 1
          fi

          push_cfg_path="${RUNNER_TEMP}/exordos-production-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.yaml"
          if [[ "${PUBLISH_REQUESTED:-false}" == "true" ]]; then
            (
              umask 077
              printf "%s" "${PUSH_CFG}" | base64 -d > "${push_cfg_path}"
            )
          fi
          trap 'rm -f "${push_cfg_path}"' EXIT

          push_immutable() {
            local element_dir="$1"
            local push_log="$2"
            local status

            if "${EXORDOS_BIN}" push . \
              --exordos-cfg-file "${push_cfg_path}" \
              --element-dir "${element_dir}" > "${push_log}" 2>&1; then
              status=0
            else
              status=$?
            fi
            if (( status != 0 )); then
              echo "Immutable element publication failed" >&2
              return 1
            fi
            if grep -Fq " already exists." "${push_log}"; then
              echo "Immutable element version already exists" >&2
              return 1
            fi
          }

          original_head="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse "${original_head}^{tree}")"
          ui_dir="${GITHUB_WORKSPACE}/../workspace_ui"
          ui_head="$(git -C "${ui_dir}" rev-parse HEAD)"
          test -z "$(git status --porcelain)"
          git -C "${ui_dir}" diff --quiet
          git -C "${ui_dir}" diff --cached --quiet
          git config --local user.name "CASSI CI"
          git config --local user.email "cassi@exordos.com"

          base_version=""
          set +e
          commit_list="$(git rev-list "${original_head}")"
          history_status=$?
          set -e
          if (( history_status != 0 )); then
            echo "Git history lookup failed" >&2
            exit "${history_status}"
          fi
          while IFS= read -r commit; do
            [[ -n "${commit}" ]] || continue
            release_tag="$(
              git tag --points-at "${commit}" --list \
                | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
                | sort -V | tail -n1
            )"
            if [[ -n "${release_tag}" ]]; then
              base_version="${release_tag}"
              break
            fi
          done <<< "${commit_list}"
          base_version="${base_version:-0.0.0}"
          IFS=. read -r version_major version_minor version_patch <<< "${base_version}"
          compatibility_version_base="${version_major}.${version_minor}.$((10#${version_patch} + 1))"
          stage_version_base="${version_major}.${version_minor}.$((10#${version_patch} + 2))"
          canonical_version_base="${version_major}.${version_minor}.$((10#${version_patch} + 3))"
          rollback_version_base="${version_major}.${version_minor}.$((10#${version_patch} + 4))"
          if [[ "${GITHUB_REF_NAME}" == "master" || "${GITHUB_REF_NAME}" == "main" ]]; then
            version_channel="rc"
          else
            version_channel="dev"
          fi

          git commit --allow-empty --message \
            "CI production migration compatibility ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          compatibility_head="$(git rev-parse HEAD)"
          test "$(git rev-parse "${compatibility_head}^{tree}")" = "${source_tree}"
          compatibility_timestamp="$(
            date --utc --date="@$(git show --no-patch --format=%ct HEAD)" +%Y%m%d%H%M%S
          )"
          compatibility_version="${compatibility_version_base}-${version_channel}+${compatibility_timestamp}.${compatibility_head:0:8}"
          [[ "${compatibility_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(dev|rc)\+[0-9]{14}\.[0-9a-f]{8}$ ]]
          test -z "$(git tag --list "${compatibility_version}")"
          git tag "${compatibility_version}"
          test "$(git describe --tags --exact-match "${compatibility_head}")" = "${compatibility_version}"

          if ! "${EXORDOS_BIN}" build . \
            --exordos-cfg-file "${EXORDOS_CFG}" \
            --output-dir "${compatibility_dir}" \
            --manifest-var mail_migration_compatibility=true \
            --manifest-var workspace_backend_image="${CURRENT_BACKEND_IMAGE_URN}" \
            --manifest-var retain_legacy_mail_resources=true \
            > "${archive_tmp}/compatibility-build.log" 2>&1; then
            echo "Production migration compatibility build failed" >&2
            exit 1
          fi

          compatibility_element_dir="${compatibility_dir}/exordos-elements/workspace/${compatibility_version}"
          compatibility_manifest="${compatibility_element_dir}/manifests/workspace.yaml"
          compatibility_inventory="${compatibility_element_dir}/inventory.json"
          test -f "${compatibility_manifest}"
          test -f "${compatibility_inventory}"
          test -f "${compatibility_element_dir}/images/workspace-backend.raw.zst"
          test -f "${compatibility_element_dir}/images/workspace-mail.raw.zst"
          if ! COMPATIBILITY_MAIL_IMAGE_URN="$(
            EXPECTED_ELEMENT_VERSION="${compatibility_version}" \
              python3 exordos/ci/verify-production-migration-manifest.py \
                compatibility "${compatibility_manifest}" \
                "${compatibility_inventory}" \
                2> "${archive_tmp}/compatibility-verification.log"
          )"; then
            echo "Production migration compatibility verification failed" >&2
            exit 1
          fi
          [[ "${COMPATIBILITY_MAIL_IMAGE_URN}" =~ ^urn:images:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]
          export COMPATIBILITY_MAIL_IMAGE_URN
          if ! (
            find "${compatibility_dir}" -type f -name '*.zst' -print0 \
              | sort -z | xargs -0 -r -n1 zstd -t -q
          ) 2>> "${archive_tmp}/compatibility-verification.log"; then
            echo "Production migration compatibility compression check failed" >&2
            exit 1
          fi
          printf '%s\n' "zstd -t: passed" \
            > "${archive_tmp}/compatibility-compression-check.txt"
          if ! (
            cd "${compatibility_dir}" \
              && find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > "${migration_root}/compatibility.sha256" \
            2>> "${archive_tmp}/compatibility-verification.log"; then
            echo "Production migration compatibility digest failed" >&2
            exit 1
          fi

          git diff --quiet
          git diff --cached --quiet
          test "$(git -C "${ui_dir}" rev-parse HEAD)" = "${ui_head}"
          git -C "${ui_dir}" diff --quiet
          git -C "${ui_dir}" diff --cached --quiet
          git commit --allow-empty --message \
            "CI production migration stage ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          stage_head="$(git rev-parse HEAD)"
          test "$(git rev-parse "${stage_head}^{tree}")" = "${source_tree}"
          stage_timestamp="$(
            date --utc --date="@$(git show --no-patch --format=%ct HEAD)" +%Y%m%d%H%M%S
          )"
          stage_version="${stage_version_base}-${version_channel}+${stage_timestamp}.${stage_head:0:8}"
          [[ "${stage_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(dev|rc)\+[0-9]{14}\.[0-9a-f]{8}$ ]]
          test -z "$(git tag --list "${stage_version}")"
          git tag "${stage_version}"
          test "$(git describe --tags --exact-match "${stage_head}")" = "${stage_version}"

          if ! "${EXORDOS_BIN}" build . \
            --exordos-cfg-file "${EXORDOS_CFG}" \
            --output-dir "${stage_dir}" \
            --manifest-var messenger_storage_mode=mail_projection \
            --manifest-var messenger_canonical_cutover_confirmed=false \
            --manifest-var retain_legacy_mail_resources=true \
            --manifest-var mail_migration_cutover_keep_legacy_disk=true \
            --manifest-var workspace_mail_image="${COMPATIBILITY_MAIL_IMAGE_URN}" \
            > "${archive_tmp}/stage-build.log" 2>&1; then
            echo "Production migration stage build failed" >&2
            exit 1
          fi

          stage_element_dir="${stage_dir}/exordos-elements/workspace/${stage_version}"
          stage_manifest="${stage_element_dir}/manifests/workspace.yaml"
          stage_inventory="${stage_element_dir}/inventory.json"
          test -f "${stage_manifest}"
          test -f "${stage_inventory}"
          test -f "${stage_element_dir}/images/workspace-backend.raw.zst"
          test -f "${stage_element_dir}/images/workspace-mail.raw.zst"
          if ! STAGE_BACKEND_IMAGE_URN="$(
            EXPECTED_ELEMENT_VERSION="${stage_version}" \
              python3 exordos/ci/verify-production-migration-manifest.py \
                stage "${stage_manifest}" "${stage_inventory}" \
                2> "${archive_tmp}/stage-verification.log"
          )"; then
            echo "Production migration stage verification failed" >&2
            exit 1
          fi
          [[ "${STAGE_BACKEND_IMAGE_URN}" =~ ^urn:images:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]
          export STAGE_BACKEND_IMAGE_URN
          if ! (
            find "${stage_dir}" -type f -name '*.zst' -print0 \
              | sort -z | xargs -0 -r -n1 zstd -t -q
          ) 2>> "${archive_tmp}/stage-verification.log"; then
            echo "Production migration stage compression check failed" >&2
            exit 1
          fi
          printf '%s\n' "zstd -t: passed" \
            > "${archive_tmp}/stage-compression-check.txt"
          if ! (
            cd "${stage_dir}" \
              && find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > "${migration_root}/stage.sha256" \
            2>> "${archive_tmp}/stage-verification.log"; then
            echo "Production migration stage digest failed" >&2
            exit 1
          fi

          git diff --quiet
          git diff --cached --quiet
          test "$(git -C "${ui_dir}" rev-parse HEAD)" = "${ui_head}"
          git -C "${ui_dir}" diff --quiet
          git -C "${ui_dir}" diff --cached --quiet
          git commit --allow-empty --message \
            "CI production migration canonical ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          canonical_head="$(git rev-parse HEAD)"
          test "$(git rev-parse "${canonical_head}^{tree}")" = "${source_tree}"
          canonical_timestamp="$(
            date --utc --date="@$(git show --no-patch --format=%ct HEAD)" +%Y%m%d%H%M%S
          )"
          canonical_version="${canonical_version_base}-${version_channel}+${canonical_timestamp}.${canonical_head:0:8}"
          [[ "${canonical_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(dev|rc)\+[0-9]{14}\.[0-9a-f]{8}$ ]]
          test "${canonical_version}" != "${stage_version}"
          test -z "$(git tag --list "${canonical_version}")"
          git tag "${canonical_version}"
          test "$(git describe --tags --exact-match "${canonical_head}")" = "${canonical_version}"

          if ! "${EXORDOS_BIN}" build . \
            --exordos-cfg-file "${EXORDOS_CFG}" \
            --output-dir "${canonical_dir}" \
            --manifest-var workspace_backend_image="${STAGE_BACKEND_IMAGE_URN}" \
            --manifest-var workspace_mail_image="${COMPATIBILITY_MAIL_IMAGE_URN}" \
            --manifest-var messenger_storage_mode=postgresql_canonical \
            --manifest-var messenger_canonical_cutover_confirmed=true \
            --manifest-var retain_legacy_mail_resources=true \
            > "${archive_tmp}/canonical-build.log" 2>&1; then
            echo "Production migration canonical build failed" >&2
            exit 1
          fi

          canonical_element_dir="${canonical_dir}/exordos-elements/workspace/${canonical_version}"
          canonical_manifest="${canonical_element_dir}/manifests/workspace.yaml"
          canonical_inventory="${canonical_element_dir}/inventory.json"
          test -f "${canonical_manifest}"
          test -f "${canonical_inventory}"
          test -f "${canonical_element_dir}/images/workspace-backend.raw.zst"
          test -f "${canonical_element_dir}/images/workspace-mail.raw.zst"
          EXPECTED_ELEMENT_VERSION="${canonical_version}" \
            python3 exordos/ci/verify-production-migration-manifest.py \
              canonical "${canonical_manifest}" "${canonical_inventory}" \
              2> "${archive_tmp}/canonical-verification.log"
          if ! (
            find "${canonical_dir}" -type f -name '*.zst' -print0 \
              | sort -z | xargs -0 -r -n1 zstd -t -q
          ) 2>> "${archive_tmp}/canonical-verification.log"; then
            echo "Production migration canonical compression check failed" >&2
            exit 1
          fi
          printf '%s\n' "zstd -t: passed" \
            > "${archive_tmp}/canonical-compression-check.txt"
          if ! (
            cd "${canonical_dir}" \
              && find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > "${migration_root}/canonical.sha256" \
            2>> "${archive_tmp}/canonical-verification.log"; then
            echo "Production migration canonical digest failed" >&2
            exit 1
          fi

          test "$(git rev-parse "${canonical_head}^{tree}")" = "${source_tree}"
          git diff --quiet
          git diff --cached --quiet
          test "$(git -C "${ui_dir}" rev-parse HEAD)" = "${ui_head}"
          git -C "${ui_dir}" diff --quiet
          git -C "${ui_dir}" diff --cached --quiet

          git commit --allow-empty --message \
            "CI production migration rollback ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          rollback_head="$(git rev-parse HEAD)"
          test "$(git rev-parse "${rollback_head}^{tree}")" = "${source_tree}"
          rollback_timestamp="$(
            date --utc --date="@$(git show --no-patch --format=%ct HEAD)" +%Y%m%d%H%M%S
          )"
          rollback_version="${rollback_version_base}-${version_channel}+${rollback_timestamp}.${rollback_head:0:8}"
          [[ "${rollback_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(dev|rc)\+[0-9]{14}\.[0-9a-f]{8}$ ]]
          test "${rollback_version}" != "${stage_version}"
          test "${rollback_version}" != "${canonical_version}"
          test -z "$(git tag --list "${rollback_version}")"
          git tag "${rollback_version}"
          test "$(git describe --tags --exact-match "${rollback_head}")" = "${rollback_version}"

          if ! "${EXORDOS_BIN}" build . \
            --exordos-cfg-file "${EXORDOS_CFG}" \
            --output-dir "${rollback_dir}" \
            --manifest-var workspace_backend_image="${STAGE_BACKEND_IMAGE_URN}" \
            --manifest-var workspace_mail_image="${COMPATIBILITY_MAIL_IMAGE_URN}" \
            --manifest-var messenger_storage_mode=mail_projection \
            --manifest-var messenger_canonical_cutover_confirmed=false \
            --manifest-var retain_legacy_mail_resources=true \
            --manifest-var mail_migration_cutover_keep_legacy_disk=true \
            > "${archive_tmp}/rollback-build.log" 2>&1; then
            echo "Production migration rollback build failed" >&2
            exit 1
          fi

          rollback_element_dir="${rollback_dir}/exordos-elements/workspace/${rollback_version}"
          rollback_manifest="${rollback_element_dir}/manifests/workspace.yaml"
          rollback_inventory="${rollback_element_dir}/inventory.json"
          test -f "${rollback_manifest}"
          test -f "${rollback_inventory}"
          test -f "${rollback_element_dir}/images/workspace-backend.raw.zst"
          test -f "${rollback_element_dir}/images/workspace-mail.raw.zst"
          EXPECTED_ELEMENT_VERSION="${rollback_version}" \
            python3 exordos/ci/verify-production-migration-manifest.py \
              rollback "${rollback_manifest}" "${rollback_inventory}" \
              2> "${archive_tmp}/rollback-verification.log"
          if ! (
            find "${rollback_dir}" -type f -name '*.zst' -print0 \
              | sort -z | xargs -0 -r -n1 zstd -t -q
          ) 2>> "${archive_tmp}/rollback-verification.log"; then
            echo "Production migration rollback compression check failed" >&2
            exit 1
          fi
          printf '%s\n' "zstd -t: passed" \
            > "${archive_tmp}/rollback-compression-check.txt"
          if ! (
            cd "${rollback_dir}" \
              && find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > "${migration_root}/rollback.sha256" \
            2>> "${archive_tmp}/rollback-verification.log"; then
            echo "Production migration rollback digest failed" >&2
            exit 1
          fi

          test "$(git rev-parse "${rollback_head}^{tree}")" = "${source_tree}"
          git diff --quiet
          git diff --cached --quiet
          test "$(git -C "${ui_dir}" rev-parse HEAD)" = "${ui_head}"
          git -C "${ui_dir}" diff --quiet
          git -C "${ui_dir}" diff --cached --quiet

          set +e
          (
            set -euo pipefail
            umask 077
            cp "${compatibility_manifest}" \
              "${archive_tmp}/compatibility-workspace.yaml"
            cp "${compatibility_inventory}" \
              "${archive_tmp}/compatibility-inventory.json"
            cp "${stage_manifest}" "${archive_tmp}/stage-workspace.yaml"
            cp "${stage_inventory}" "${archive_tmp}/stage-inventory.json"
            cp "${canonical_manifest}" "${archive_tmp}/canonical-workspace.yaml"
            cp "${canonical_inventory}" "${archive_tmp}/canonical-inventory.json"
            cp "${rollback_manifest}" "${archive_tmp}/rollback-workspace.yaml"
            cp "${rollback_inventory}" "${archive_tmp}/rollback-inventory.json"
            cp "${migration_root}/compatibility.sha256" \
              "${archive_tmp}/compatibility.sha256"
            cp "${migration_root}/stage.sha256" "${archive_tmp}/stage.sha256"
            cp "${migration_root}/canonical.sha256" "${archive_tmp}/canonical.sha256"
            cp "${migration_root}/rollback.sha256" "${archive_tmp}/rollback.sha256"
            printf '%s\n' "${original_head}" > "${archive_tmp}/source-commit.txt"
            printf '%s\n' "${source_tree}" > "${archive_tmp}/source-tree.txt"
            printf '%s\n' "${ui_head}" > "${archive_tmp}/workspace-ui-commit.txt"
            printf '%s\n' "${compatibility_head}" \
              > "${archive_tmp}/compatibility-commit.txt"
            printf '%s\n' "${stage_head}" > "${archive_tmp}/stage-commit.txt"
            printf '%s\n' "${canonical_head}" > "${archive_tmp}/canonical-commit.txt"
            printf '%s\n' "${rollback_head}" > "${archive_tmp}/rollback-commit.txt"
            printf '%s\n' "${compatibility_version}" \
              > "${archive_tmp}/compatibility-version.txt"
            printf '%s\n' "${stage_version}" > "${archive_tmp}/stage-version.txt"
            printf '%s\n' "${canonical_version}" > "${archive_tmp}/canonical-version.txt"
            printf '%s\n' "${rollback_version}" > "${archive_tmp}/rollback-version.txt"
            printf '%s\n' "${STAGE_BACKEND_IMAGE_URN}" \
              > "${archive_tmp}/stage-backend-image.urn"
            printf '%s\n' "${COMPATIBILITY_MAIL_IMAGE_URN}" \
              > "${archive_tmp}/compatibility-mail-image.urn"
            printf '%s\n' "${CURRENT_BACKEND_IMAGE_URN}" \
              > "${archive_tmp}/current-backend-image.urn"
            printf '%s\n' "${CURRENT_MAIL_IMAGE_URN}" \
              > "${archive_tmp}/current-mail-image.urn"
            printf '%s\n' "${PUBLISH_REQUESTED:-false}" \
              > "${archive_tmp}/publication-requested.txt"
            printf '%s\n' "${GITHUB_RUN_ID}" > "${archive_tmp}/github-run-id.txt"
            printf '%s\n' "${GITHUB_RUN_ATTEMPT}" \
              > "${archive_tmp}/github-run-attempt.txt"
            printf '%s\n' "${EXORDOS_RELEASE_SHA256}" \
              > "${archive_tmp}/exordos-download.sha256"
            "${EXORDOS_BIN}" version > "${archive_tmp}/exordos-version.txt" 2>&1
            printf '%s\n' prepared > "${archive_tmp}/state.txt"
          ) 2>/dev/null
          archive_status=$?
          set -e
          if (( archive_status != 0 )); then
            echo "Private production migration evidence preparation failed" >&2
            exit 1
          fi

          set +e
          (
            set -euo pipefail
            find "${archive_tmp}" -type d -exec chmod 0700 {} +
            find "${archive_tmp}" -type f -exec chmod 0600 {} +
            (
              cd "${archive_tmp}" \
                && find . -type f ! -name evidence.sha256 -print0 | sort -z \
                  | xargs -0 sha256sum
            ) > "${archive_tmp}/evidence.sha256"
            chmod 0600 "${archive_tmp}/evidence.sha256"
            mv "${archive_tmp}" "${archive_final}"
          ) 2>/dev/null
          archive_status=$?
          set -e
          if (( archive_status != 0 )); then
            echo "Private production migration evidence archival failed" >&2
            exit 1
          fi
          echo "Private production migration evidence archived"

          update_evidence_state() {
            local requested_state="$1"
            (
              set -euo pipefail
              umask 077
              local state_tmp="${archive_final}/.state.txt.tmp"
              local digest_tmp="${archive_final}/.evidence.sha256.tmp"
              case "${requested_state}" in
                published|publication_failed|verified_only) ;;
                *) exit 1 ;;
              esac
              test -d "${archive_final}"
              test "$(cat "${archive_final}/state.txt")" = prepared
              printf '%s\n' "${requested_state}" > "${state_tmp}"
              chmod 0600 "${state_tmp}"
              mv "${state_tmp}" "${archive_final}/state.txt"
              find "${archive_final}" -type d -exec chmod 0700 {} +
              find "${archive_final}" -type f -exec chmod 0600 {} +
              (
                cd "${archive_final}" \
                  && find . -type f \
                    ! -name evidence.sha256 \
                    ! -name .evidence.sha256.tmp \
                    ! -name .state.txt.tmp \
                    -print0 | sort -z | xargs -0 sha256sum
              ) > "${digest_tmp}"
              chmod 0600 "${digest_tmp}"
              mv "${digest_tmp}" "${archive_final}/evidence.sha256"
            ) 2>/dev/null
          }

          readback_evidence_state() {
            local expected_state="$1"
            (
              set -euo pipefail
              case "${expected_state}" in
                published|publication_failed|verified_only) ;;
                *) exit 1 ;;
              esac
              test -d "${archive_final}"
              (
                cd "${archive_final}" \
                  && sha256sum --check --status evidence.sha256
              )
              test "$(cat "${archive_final}/state.txt")" = "${expected_state}"
              test "$(cat "${archive_final}/source-commit.txt")" = "${original_head}"
              test "$(cat "${archive_final}/source-tree.txt")" = "${source_tree}"
              test "$(cat "${archive_final}/workspace-ui-commit.txt")" = "${ui_head}"
              test "$(cat "${archive_final}/compatibility-commit.txt")" = "${compatibility_head}"
              test "$(cat "${archive_final}/stage-commit.txt")" = "${stage_head}"
              test "$(cat "${archive_final}/canonical-commit.txt")" = "${canonical_head}"
              test "$(cat "${archive_final}/rollback-commit.txt")" = "${rollback_head}"
              test "$(cat "${archive_final}/compatibility-version.txt")" = "${compatibility_version}"
              test "$(cat "${archive_final}/stage-version.txt")" = "${stage_version}"
              test "$(cat "${archive_final}/canonical-version.txt")" = "${canonical_version}"
              test "$(cat "${archive_final}/rollback-version.txt")" = "${rollback_version}"
              test "$(cat "${archive_final}/stage-backend-image.urn")" = "${STAGE_BACKEND_IMAGE_URN}"
              test "$(cat "${archive_final}/compatibility-mail-image.urn")" = "${COMPATIBILITY_MAIL_IMAGE_URN}"
              test "$(cat "${archive_final}/current-backend-image.urn")" = "${CURRENT_BACKEND_IMAGE_URN}"
              test "$(cat "${archive_final}/current-mail-image.urn")" = "${CURRENT_MAIL_IMAGE_URN}"
              test "$(cat "${archive_final}/publication-requested.txt")" = "${PUBLISH_REQUESTED:-false}"
              test "$(cat "${archive_final}/github-run-id.txt")" = "${GITHUB_RUN_ID}"
              test "$(cat "${archive_final}/github-run-attempt.txt")" = "${GITHUB_RUN_ATTEMPT}"
              test "$(cat "${archive_final}/exordos-download.sha256")" = "${EXORDOS_RELEASE_SHA256}"
            ) 2>/dev/null
          }

          publication_status=0
          if [[ "${PUBLISH_REQUESTED:-false}" == "true" ]]; then
            if push_immutable "${compatibility_dir}" \
              "${archive_final}/compatibility-push.log"; then
              :
            else
              publication_status=$?
            fi
            if (( publication_status == 0 )); then
              if push_immutable "${stage_dir}" "${archive_final}/stage-push.log"; then
                :
              else
                publication_status=$?
              fi
            fi
            if (( publication_status == 0 )); then
              if push_immutable "${rollback_dir}" "${archive_final}/rollback-push.log"; then
                :
              else
                publication_status=$?
              fi
            fi
            if (( publication_status == 0 )); then
              if push_immutable "${canonical_dir}" "${archive_final}/canonical-push.log"; then
                :
              else
                publication_status=$?
              fi
            fi
            if (( publication_status != 0 )); then
              set +e
              update_evidence_state publication_failed
              archive_status=$?
              set -e
              if (( archive_status != 0 )); then
                echo "Private publication failure evidence update failed" >&2
              else
                set +e
                readback_evidence_state publication_failed
                archive_status=$?
                set -e
                if (( archive_status != 0 )); then
                  echo "Private publication failure evidence readback failed" >&2
                fi
              fi
              echo "Production migration publication failed" >&2
              exit 1
            fi
            final_evidence_state=published
          else
            printf '%s\n' "Publication was not requested" \
              > "${archive_final}/compatibility-push.log"
            printf '%s\n' "Publication was not requested" \
              > "${archive_final}/stage-push.log"
            printf '%s\n' "Publication was not requested" \
              > "${archive_final}/rollback-push.log"
            printf '%s\n' "Publication was not requested" \
              > "${archive_final}/canonical-push.log"
            final_evidence_state=verified_only
          fi

          set +e
          update_evidence_state "${final_evidence_state}"
          archive_status=$?
          set -e
          if (( archive_status != 0 )); then
            echo "Private production migration evidence state update failed" >&2
            exit 1
          fi
          set +e
          readback_evidence_state "${final_evidence_state}"
          archive_status=$?
          set -e
          if (( archive_status != 0 )); then
            echo "Private production migration evidence readback failed" >&2
            exit 1
          fi
          printf 'Private production migration evidence state: %s\n' \
            "${final_evidence_state}"
          if [[ "${final_evidence_state}" == "published" ]]; then
            printf 'compatibility_version=%s\n' "${compatibility_version}" \
              >> "${GITHUB_OUTPUT}"
            printf 'stage_version=%s\n' "${stage_version}" >> "${GITHUB_OUTPUT}"
            printf 'canonical_version=%s\n' "${canonical_version}" >> "${GITHUB_OUTPUT}"
            printf 'rollback_version=%s\n' "${rollback_version}" >> "${GITHUB_OUTPUT}"
            printf 'Published production migration versions: compatibility=%s stage=%s canonical=%s rollback=%s\n' \
              "${compatibility_version}" "${stage_version}" \
              "${canonical_version}" "${rollback_version}"
          else
            echo "Production migration versions are verified only and not deployable"
          fi
