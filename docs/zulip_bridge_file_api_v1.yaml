            $ref: '#/components/schemas/FileApiError'

x-workspace-file-lifecycle:
  pending-allocation-expiry-seconds: 300
  cleanup-worker-interval-seconds: 60
  expired-pending-object-removal-deadline-seconds: 600
  outgoing-idempotency-retention-seconds: 86400
  rules:
    - |
      Pending objects have no sidecar, no canonical file record, and no public
      URN. Cleanup deletes every generation-specific pending object no later
      than ten minutes after its URL expiry. An immutable descriptor tombstone
      is retained for the operation lifetime plus 24 hours to detect conflicting
      reuse of a client UUID.
    - |
      Incoming finalized files are provider-owned copies. Deselecting a chat,
      losing provider access, deleting or deactivating the account, discarding
      the source operation before commit, or removing the projection revokes
      authorization synchronously and journals the canonical file deletion.
      Object and sidecar deletion is retryable and must begin immediately;
      physical object-store lag never restores access or permits a new URL.
    - |
      Finalized sidecars are backend-owned schema-version-2 records. Their
      `origin.kind` is `external_provider`; origin account/chat/operation fields
      support recovery and purge. They never contain a participant snapshot,
      provider credential, presigned URL, object-store credential, or raw
      provider payload. Current access is always recomputed from the canonical
      chat/stream assignment and current stream membership.
    - |
      The final object key is derived only by the backend from `file_uuid` and
      is immutable. The presigned PUT targets a distinct generation-specific
      pending key. The presigned GET targets exactly the final object. Neither
      URL authorizes bucket listing, multipart upload, delete, copy, tagging,
      ACL mutation, sidecar access, or another HTTP method.
