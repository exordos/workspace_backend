        application/json:
          schema:
            $ref: '#/components/schemas/FileApiError'
    FileTooLarge:
      description: Declared file size exceeds 50 MiB (`file_too_large`).
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileApiError'
    UnsupportedContentType:
      description: >-
        Media type is invalid or denied by realm policy
        (`unsupported_content_type`).
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileApiError'
    IntegrityMismatch:
      description: |
        Actual object size, content type, or SHA-256 differs from the declared
